<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7C6CF0"/>
      <stop offset="100%" stop-color="#2ED8C8"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7C6CF0" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#2ED8C8" stop-opacity="0.03"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Prism — equilateral, centered -->
  <polygon points="50,8 96,88 4,88" fill="url(#glass)"/>
  <polygon points="50,8 96,88 4,88" fill="none" stroke="url(#g1)" stroke-width="2.8" stroke-linejoin="round"/>

  <!-- Incoming beam -->
  <line x1="-4" y1="52" x2="26" y2="52" stroke="#9B8FF4" stroke-width="2.2" stroke-linecap="round" opacity="0.5"/>

  <!-- Spectrum -->
  <g filter="url(#glow)">
    <line x1="74" y1="38" x2="106" y2="18" stroke="#F87171" stroke-width="1.8" stroke-linecap="round" opacity="0.9"/>
    <line x1="76" y1="44" x2="106" y2="32" stroke="#FB923C" stroke-width="1.8" stroke-linecap="round" opacity="0.9"/>
    <line x1="77" y1="50" x2="106" y2="48" stroke="#FACC15" stroke-width="1.8" stroke-linecap="round" opacity="0.9"/>
    <line x1="76" y1="56" x2="106" y2="62" stroke="#34D399" stroke-width="1.8" stroke-linecap="round" opacity="0.9"/>
    <line x1="74" y1="62" x2="106" y2="76" stroke="#22D3EE" stroke-width="1.8" stroke-linecap="round" opacity="0.9"/>
    <line x1="72" y1="68" x2="106" y2="88" stroke="#818CF8" stroke-width="1.8" stroke-linecap="round" opacity="0.9"/>
  </g>
</svg>
