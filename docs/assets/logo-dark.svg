<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 120" fill="none">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7C6CF0"/>
      <stop offset="100%" stop-color="#2ED8C8"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7C6CF0" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#2ED8C8" stop-opacity="0.04"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g transform="translate(16, 10)">
    <polygon points="45,11 90,89 0,89" fill="url(#glass)"/>
    <polygon points="45,11 90,89 0,89" fill="none" stroke="url(#g1)" stroke-width="2.4" stroke-linejoin="round"/>
    <line x1="-8" y1="54" x2="22" y2="54" stroke="#9B8FF4" stroke-width="2" stroke-linecap="round" opacity="0.55"/>
    <g filter="url(#glow)">
      <line x1="68" y1="40" x2="104" y2="22" stroke="#F87171" stroke-width="1.6" stroke-linecap="round" opacity="0.9"/>
      <line x1="70" y1="46" x2="104" y2="36" stroke="#FB923C" stroke-width="1.6" stroke-linecap="round" opacity="0.9"/>
      <line x1="71" y1="52" x2="104" y2="50" stroke="#FACC15" stroke-width="1.6" stroke-linecap="round" opacity="0.9"/>
      <line x1="70" y1="58" x2="104" y2="64" stroke="#34D399" stroke-width="1.6" stroke-linecap="round" opacity="0.9"/>
      <line x1="68" y1="64" x2="104" y2="78" stroke="#22D3EE" stroke-width="1.6" stroke-linecap="round" opacity="0.9"/>
      <line x1="66" y1="70" x2="104" y2="90" stroke="#818CF8" stroke-width="1.6" stroke-linecap="round" opacity="0.9"/>
    </g>
  </g>

  <text x="138" y="77" font-family="'Inter','SF Pro Display','Helvetica Neue',Arial,sans-serif" font-size="56" font-weight="600" letter-spacing="-1.5" fill="#1A1A2E">spek<tspan fill="url(#g1)">tr</tspan></text>
</svg>
